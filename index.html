<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Colorado's Boxing — Entrenamiento</title>
<link rel="apple-touch-icon" href="logo-trainer.png">
<link rel="icon" type="image/png" href="logo-trainer.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9952a; --gold2: #e8b84b; --black: #0a0a0a; --dark: #111;
  --dark2: #1a1a1a; --white: #f0ede8; --gray: #666; --success: #2ecc71;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Montserrat',sans-serif; background:var(--black); color:var(--white); height:100vh; overflow:hidden; display:flex; flex-direction:column; }

/* DISEÑO ORIGINAL RECUPERADO */
.header { background: linear-gradient(135deg, #0a0a0a, #1a1200); border-bottom: 1px solid rgba(201,149,42,0.3); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
.header img { width:38px; height:38px; }
.header-title { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--gold); letter-spacing:2px; }

.main { flex:1; overflow-y:auto; padding:16px; padding-bottom:100px; }
.card { background: var(--dark2); border:1px solid #2a2a2a; border-radius:12px; padding:16px; margin-bottom:12px; }
.section-title { font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--gold); margin-bottom:12px; }

.btn { width:100%; padding:14px; border-radius:10px; font-weight:700; border:none; cursor:pointer; text-transform:uppercase; font-family:'Montserrat'; }
.btn-gold { background:linear-gradient(135deg, var(--gold), #8a6009); color:var(--black); }

input { width:100%; background:#1a1a1a; border:1px solid #333; color:white; font-size:24px; text-align:center; padding:15px; border-radius:12px; margin-bottom:20px; }

#login-screen { position:fixed; inset:0; background:var(--black); z-index:9000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; }
</style>
</head>
<body>

<div id="login-screen">
    <img src="logo-trainer.png" style="width:100px; margin-bottom:20px;">
    <h1 style="font-family:'Bebas Neue'; color:var(--gold); font-size:28px; letter-spacing:3px;">COLORADO'S BOXING</h1>
    <p style="color:var(--gray); font-size:11px; margin-bottom:30px;">INTRODUCE TU PIN DE ALUMNO</p>
    <input id="pin-input" type="password" inputmode="numeric" placeholder="0000">
    <button onclick="doLogin()" class="btn btn-gold">ENTRAR A ENTRENAR</button>
</div>

<div class="header">
    <img src="logo-trainer.png">
    <div class="header-title" id="nav-title">CBC TRAINING</div>
    <div onclick="logout()" style="cursor:pointer; font-size:20px;">🚪</div>
</div>

<div class="main" id="app-content">
    </div>

<script>
const sb = supabase.createClient('https://btdtpruxntodjuzomdcq.supabase.co', 'sb_publishable_NA4niv3lN1R5OUkwJH8ihA_d547f1h4');

async function doLogin() {
    const pin = document.getElementById('pin-input').value;
    
    // ACCESO MAESTRO PARA RICARDO
    if(pin === "1234") {
        document.getElementById('login-screen').style.display = 'none';
        renderCoach();
        return;
    }

    // BUSCAR ALUMNO EN SUPABASE
    const { data } = await sb.from('training_clients').select('*').eq('pin', pin).single();
    if(data) {
        document.getElementById('login-screen').style.display = 'none';
        renderClient(data);
    } else {
        alert("PIN no reconocido");
    }
}

function renderCoach() {
    document.getElementById('nav-title').innerText = "COACH PANEL";
    const container = document.getElementById('app-content');
    container.innerHTML = `
        <h2 class="section-title">Panel de Control</h2>
        <button class="btn btn-gold" onclick="nuevoAlumno()">+ AGREGAR ALUMNO</button>
        <div id="lista" style="margin-top:20px;"></div>
    `;
    cargarAlumnos();
}

async function cargarAlumnos() {
    const { data } = await sb.from('training_clients').select('*');
    const lista = document.getElementById('lista');
    lista.innerHTML = (data || []).map(c => `
        <div class="card">
            <strong>${c.name}</strong><br>
            <small style="color:var(--gold)">PIN: ${c.pin}</small>
        </div>
    `).join('');
}

async function nuevoAlumno() {
    const n = prompt("Nombre:");
    const p = prompt("PIN (4 números):");
    if(n && p) {
        await sb.from('training_clients').insert([{name: n, pin: p}]);
        cargarAlumnos();
    }
}

function renderClient(u) {
    document.getElementById('nav-title').innerText = "MI RUTINA";
    document.getElementById('app-content').innerHTML = `
        <h2 class="section-title">Hola, ${u.name} 🥊</h2>
        <div class="card">Cargando tus ejercicios...</div>
    `;
}

function logout() { location.reload(); }
</script>
</body>
</html>
